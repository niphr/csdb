url: https://niphr.github.io/csdb/

template:
  package: cstemplate
  params:
    hero:
      overline: "R package · Databases"
      title: "Databases for large datasets."
      lede: >
        An abstracted, object-oriented system for large datasets across database
        systems — robust PostgreSQL connections, bulk loading and upserts, validation,
        and index management.
      cta:
        primary:
          text: "Get started"
          href: "articles/csdb.html"
        secondary:
          text: "Browse the reference →"
          href: "reference/index.html"

reference:
- title: "Core Database Classes"
  desc: "Main R6 classes for database connection and table management"
  contents:
  - DBConnection_v9
  - DBTable_v9

- title: "Database Utilities"
  desc: "Helper functions for database operations and metadata"
  contents:
  - get_table_names_and_info
  - csdb_set_auth_hook
  - csdb_get_auth_hook

- title: "Data Validation"
  desc: "Functions for validating field types and data contents"
  contents:
  - starts_with("validator_field_types")
  - starts_with("validator_field_contents")

- title: "Datasets"
  desc: "Example datasets included with the package"
  contents:
  - nor_covid19_cases_by_time_location

authors:
  footer:
    roles: [cre, aut]
    text: "Crafted by"
  sidebar:
    roles: [cre, aut, cph]
  before: "This package is proudly brought to you by:"
  after: "See the [changelog](news/index.html) for other contributors. :pray:"
  Richard Aubrey White:
    href: "https://www.rwhite.no"
